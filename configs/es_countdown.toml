# ES on countdown — reach a target by combining the given numbers.
# sigma/trust-region auto-scale to the LoRA geometry (the -1 defaults).
#
#   python run.py --config configs/es_countdown.toml --seed 0
#
# Keys are RunConfig field names; any CLI flag still overrides what's here.
method = "es"
task = "countdown"
model = "qwen3.5-0.8b"
max_samples = 64
es_population = 16
es_eval_batch = 8
es_steps = 40
max_completion_length = 256
output_dir = "outputs/es-countdown"
