# ES on alphabet-sort with LFM2.5-1.2B-Instruct.
# Hub-backed task: needs .venv-prime (see README).
#
#   python run.py --config configs/es_alphabet_sort_lfm.toml --seed 0
method = "es"
task = "env:primeintellect/alphabet-sort"
model = "lfm2.5-1.2b"
max_samples = 64
max_prompt_length = 512
max_completion_length = 2048
repetition_penalty = 1.2
es_population = 16
es_eval_batch = 8
es_steps = 40
output_dir = "outputs/es-alphabet-sort-lfm"
