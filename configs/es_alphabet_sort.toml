# ES on alphabet-sort — sort a list of words alphabetically.
# Hub-backed task: needs .venv-prime (see README).
# Install once: scripts/setup_prime_venv.sh primeintellect/alphabet-sort
#
#   python run.py --config configs/es_alphabet_sort.toml --seed 0
method = "es"
task = "env:primeintellect/alphabet-sort"
model = "qwen3.5-0.8b"
max_samples = 64
max_prompt_length = 512
max_completion_length = 2048
repetition_penalty = 1.2
es_population = 16
es_eval_batch = 8
es_steps = 40
output_dir = "outputs/es-alphabet-sort"
