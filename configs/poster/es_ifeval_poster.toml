# POSTER cell — ES leg (STABILIZED), LFM2.5-350M on IFEval.
# The rescued, competitive ES: antithetic LoRA-subspace search with the
# parameter-space trust region ON (the weight-space analogue of GRPO's KL
# anchor). sigma and the trust region are left on the -1 auto default, so both
# scale to the adapter geometry and this recipe transfers across model sizes
# unchanged. Hub-backed task: needs .venv-prime (see README).
#
#   python run.py --config configs/es_ifeval_poster.toml --seed 0 \
#       --output-dir outputs/poster/es_ifeval_s0
#
# Keys are RunConfig field names; any CLI flag still overrides what's here.
method = "es"
task = "ifeval"
model = "lfm2.5-350m"

max_samples = 64          # prompt pool; es_eval_batch sampled per step
es_population = 16         # 32 antithetic members per step
es_eval_batch = 8
es_steps = 40
max_prompt_length = 512
max_completion_length = 512

# Use the model's chat template (see grpo_ifeval_poster.toml). Eval must use the
# same setting so train==eval.
chat_template = "on"

# Stabilization (the point of this leg). Both auto-scale to the LoRA geometry:
#   es_sigma = -1        -> es_noise_ratio * init_norm / sqrt(P)
#   es_trust_region = -1 -> es_trust_ratio * init_norm   (ON; 0 would disable it)
# Defaults (noise_ratio 0.2, trust_ratio 0.25) are the stabilized recipe; the
# token-spam basin sits at adapter norms ~15-40x an honest solution, so the cap
# removes it geometrically. Watch theta_dev in the step log to see it bind.
es_sigma = -1.0
es_trust_region = -1.0

save_steps = 20
output_dir = "outputs/poster/es_ifeval"
