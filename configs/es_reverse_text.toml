# ES on reverse-text — output the input string reversed.
# Hub-backed task: needs .venv-prime (see README).
# Install once: scripts/setup_prime_venv.sh primeintellect/reverse-text
#
#   python run.py --config configs/es_reverse_text.toml --seed 0
#
# Keys are RunConfig field names; any CLI flag still overrides what's here.
method = "es"
task = "env:primeintellect/reverse-text"
model = "qwen3.5-0.8b"
max_samples = 64
max_completion_length = 1024
es_population = 16
es_eval_batch = 8
es_steps = 40
output_dir = "outputs/es-reverse-text"
